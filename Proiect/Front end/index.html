<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Asistent Mall-uri Cluj</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; line-height: 1.6; }
        .chat-box { border: 1px solid #ccc; padding: 20px; border-radius: 8px; background: #f9f9f9; }
        input { width: 80%; padding: 10px; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        #response { margin-top: 20px; padding: 15px; border-left: 4px solid #007bff; background: white; white-space: pre-wrap; }
        .loading { color: #666; font-style: italic; }
    </style>
</head>
<body>
    <h1> Asistent Mall-uri Cluj</h1>
    <p>Adresează o întrebare despre mall-urile din Cluj (ex: "Ce magazine sunt în Iulius Mall?" sau "Unde pot găsi Nike?")</p>

    <div class="chat-box">
        <input type="text" id="userPrompt" placeholder="Scrie aici doleanța ta...">
        <button onclick="trimiteCerere()">Întreabă AI</button>
        <div id="loading" class="loading" style="display:none;">AI-ul analizează serverele de date...</div>
        <div id="response"></div>
    </div>

    <script>
        async function trimiteCerere() {
            const prompt = document.getElementById('userPrompt').value;
            const resDiv = document.getElementById('response');
            const loader = document.getElementById('loading');

            if(!prompt) return;

            resDiv.innerText = '';
            loader.style.display = 'block';

            try {
                const response = await fetch('http://localhost:5000/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });

                const data = await response.json();
                resDiv.innerText = data.answer;
            } catch (error) {
                resDiv.innerText = "Eroare: Nu s-a putut contacta Proxy-ul MCP.";
            } finally {
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
